syntax = "proto3";

package grammar;

message Terminal {
  string id = 1;
  string value = 2;
}

message Neterminal {
  string id = 1;
  string value = 2;
}

message Symbol {
  oneof kind {
    string terminal_id = 1;
    string neterminal_id = 2;
  }
}

message Alternative {
  repeated Symbol symbols = 1;
}

message Rule {
  string lhs_id = 1;
  repeated Alternative rhs = 2;
}

message Grammar {
  repeated Terminal terminals = 1;
  repeated Neterminal neterminals = 2;
  repeated Rule rules = 3;
  string start_id = 4;
}
