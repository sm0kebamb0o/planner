syntax = "proto3";

package grammar;

import "common.proto";

message Symbol {
  oneof kind {
    string terminal_id = 1;
    string neterminal_id = 2;
  }
}

message Alternative {
  repeated Symbol symbols = 1;
}

message Rule {
  string lhs_id = 1;
  repeated Alternative rhs = 2;
}

message Grammar {
  repeated common.Terminal terminals = 1;
  repeated common.Neterminal neterminals = 2;
  repeated Rule rules = 3;
  string start_id = 4;
}
